<!-- Profile / Logout Bar -->
<div class="profile-bar">
  <div class="profile-bar-content">
    <button class="hamburger-btn" (click)="isSidebarOpen = !isSidebarOpen">
      <span class="icon"><i class="fas" [ngClass]="isSidebarOpen ? 'fa-times' : 'fa-bars'"></i></span>
    </button>
    <span class="app-title">Task Manager</span>
    <div class="profile-menu">
      <div class="dropdown is-hoverable is-right">
        <div class="dropdown-trigger">
          <button class="button is-white is-small profile-btn">
            <span class="icon is-small"><i class="fas fa-user-circle"></i></span>
            <span class="user-name">{{ userName }}</span>
          </button>
        </div>
        <div class="dropdown-menu" role="menu">
          <div class="dropdown-content">
            <a class="dropdown-item has-text-danger" (click)="onLogoutClick()">
              <span class="icon is-small"><i class="fas fa-sign-out-alt"></i></span>
              <span>Logout</span>
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Sidebar overlay for mobile -->
<div class="sidebar-overlay" [class.is-active]="isSidebarOpen" (click)="isSidebarOpen = false"></div>

<div class="centered-content">
  <div class="task-manager-container">
    <div class="sidebar" [class.is-open]="isSidebarOpen">
      <h1 class="title has-text-white">Lists</h1>

      <div class="list-menu">
        <div *ngIf="isLoadingLists" class="loading-spinner-small"></div>
        <div
          class="list-menu-item"
          *ngFor="let list of lists"
          routerLinkActive="is-active"
          [routerLink]="['/lists', list._id]"
        >
          <p (click)="isSidebarOpen = false">{{ list.title }}</p>
          <div class="list-item-actions">
            <a
              class="list-action-btn"
              [routerLink]="['/edit-list', list._id]"
              title="Edit list"
              (click)="$event.stopPropagation()"
            >
              <i class="fas fa-edit"></i>
            </a>
            <a
              class="list-action-btn delete-btn"
              (click)="$event.stopPropagation(); onDeleteListClick(list._id)"
              [class.is-disabled]="isDeletingList"
              title="Delete list"
            >
              <i class="fas fa-trash"></i>
            </a>
          </div>
        </div>
      </div>

      <button class="button is-success has-text-white" routerLink="/new-list" (click)="isSidebarOpen = false">
        + New List
      </button>
    </div>

    <div class="task-list-container">
      <div *ngIf="tasks">
        <div class="top-bar">
          <button
            routerLink="./new-task"
            class="button is-primary add-task-btn"
          >
            <span class="icon is-small"><i class="fas fa-plus"></i></span>
            <span>New Task</span>
          </button>
          <div class="top-bar-right">
          <button
            class="button is-info is-small export-btn"
            (click)="exportToCSV()"
            [disabled]="!tasks || tasks.length === 0"
            title="Export to Excel"
          >
            <span class="icon is-small"><i class="fas fa-file-excel"></i></span>
            <span>Export Excel</span>
          </button>
          </div>
        </div>

        <!-- Loading Tasks -->
        <div *ngIf="isLoadingTasks" class="loading-spinner"></div>

        <!-- Tasks Table -->
        <div class="task-table-wrapper" *ngIf="!isLoadingTasks && tasks.length > 0">
          <table class="table is-fullwidth is-striped is-hoverable">
            <thead>
              <tr>
                <th>Status</th>
                <th>Name</th>
                <th>Amount</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let task of tasks" [class.completed]="task.completed">
                <td>
                  <span class="icon is-small" style="cursor: pointer" (click)="onTaskClick(task)">
                    <i class="far" [ngClass]="task.completed ? 'fa-check-circle has-text-success' : 'fa-circle'"></i>
                  </span>
                </td>
                <td [class.task-done]="task.completed">{{ task.title }}</td>
                <td [class.task-done]="task.completed">{{ task.amount }}</td>
                <td>
                  <button
                    class="button is-small is-info"
                    [routerLink]="['/lists', selectedListId, 'edit-task', task._id]"
                  >
                    <span class="icon is-small"><i class="fas fa-edit"></i></span>
                  </button>
                  <button
                    class="button is-small is-danger"
                    [class.is-loading]="deletingTaskId === task._id"
                    (click)="onDeleteTaskClick(task._id)"
                    style="margin-left: 5px"
                  >
                    <span class="icon is-small"><i class="fas fa-trash"></i></span>
                  </button>
                </td>
              </tr>
            </tbody>
            <tfoot *ngIf="viewTotal">
              <tr>
                <td></td>
                <td><strong>Total</strong></td>
                <td><strong>{{ sumOfAmount }}</strong></td>
                <td></td>
              </tr>
            </tfoot>
          </table>
        </div>

        <h3 class="empty-state-text" *ngIf="!isLoadingTasks && tasks.length === 0">
          No tasks yet. Click "New Task" to add one.
        </h3>
      </div>

      <div *ngIf="!tasks">
        <h3 class="empty-state-text">Please select a list from the sidebar</h3>
      </div>
    </div>
  </div>
</div>

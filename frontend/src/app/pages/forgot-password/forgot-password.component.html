<div class="centered-content">
  <div class="white-box">

    <h1 class="title has-text-white">Reset password</h1>

    <!-- Step 1: Enter email -->
    <div *ngIf="step === 1">
      <div class="field">
        <label class="label has-text-white" for="forgot-email">Email</label>
        <p class="control has-icons-left">
          <input id="forgot-email" #emailInput class="input" type="email" placeholder="Enter your registered email">
          <span class="icon is-small is-left">
            <i class="fas fa-envelope"></i>
          </span>
        </p>
      </div>

      <div class="field" style="display: flex; justify-content: flex-end;">
        <p class="control">
          <button class="button is-link" [class.is-loading]="isSendingEmail" [disabled]="isSendingEmail" (click)="onSendResetEmail(emailInput.value)">
            Send reset code
          </button>
        </p>
      </div>
    </div>

    <!-- Step 2: Enter code + new password -->
    <div *ngIf="step === 2">
      <p class="has-text-white mb-4">A reset code was sent to <strong>{{ email }}</strong></p>

      <div class="field">
        <label class="label has-text-white" for="reset-token">Reset code</label>
        <p class="control has-icons-left">
          <input id="reset-token" #tokenInput class="input" type="text" placeholder="Enter the code from your email">
          <span class="icon is-small is-left">
            <i class="fas fa-key"></i>
          </span>
        </p>
      </div>

      <div class="field">
        <label class="label has-text-white" for="new-password">New password</label>
        <p class="control has-icons-left has-icons-right">
          <input id="new-password" #newPasswordInput class="input" [type]="showNewPassword ? 'text' : 'password'" placeholder="Enter new password">
          <span class="icon is-small is-left">
            <i class="fas fa-lock"></i>
          </span>
          <span class="icon is-small is-right">
            <button class="password-toggle-btn" type="button" aria-label="Toggle password visibility" (click)="toggleNewPasswordVisibility()">
              <i class="fas" [class.fa-eye]="!showNewPassword" [class.fa-eye-slash]="showNewPassword"></i>
            </button>
          </span>
        </p>
      </div>

      <div class="field">
        <label class="label has-text-white" for="confirm-password">Confirm new password</label>
        <p class="control has-icons-left">
          <input id="confirm-password" #confirmPasswordInput class="input" [type]="showNewPassword ? 'text' : 'password'" placeholder="Confirm new password">
          <span class="icon is-small is-left">
            <i class="fas fa-lock"></i>
          </span>
        </p>
      </div>

      <div class="field" style="display: flex; justify-content: flex-end;">
        <p class="control">
          <button class="button is-success has-text-white" [class.is-loading]="isResetting" [disabled]="isResetting" (click)="onResetPassword(tokenInput.value, newPasswordInput.value, confirmPasswordInput.value)">
            Reset password
          </button>
        </p>
      </div>
    </div>

    <div class="field" *ngIf="infoMessage">
      <p class="has-text-success">{{ infoMessage }}</p>
    </div>

    <div class="field" *ngIf="errorMessage">
      <p class="has-text-danger">{{ errorMessage }}</p>
    </div>

    <br>

    <p class="has-text-white"><a routerLink="/login">Back to login</a></p>

  </div>
</div>

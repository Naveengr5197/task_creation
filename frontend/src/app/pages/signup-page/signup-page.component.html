<div class="centered-content">
  <div class="white-box">

    <h1 class="title has-text-white">Sign up</h1>

    <div class="field">
      <p class="control has-icons-left">
        <input #usernameInput class="input" type="text" placeholder="Username">
        <span class="icon is-small is-left">
          <i class="fas fa-user"></i>
        </span>
      </p>
    </div>
    <div class="field">
      <p class="control has-icons-left">
        <input #emailInput class="input" type="email" placeholder="Email">
        <span class="icon is-small is-left">
          <i class="fas fa-envelope"></i>
        </span>
      </p>
    </div>
    <div class="field">
      <p class="control has-icons-left">
        <input #pwInput class="input" type="password" placeholder="Password">
        <span class="icon is-small is-left">
          <i class="fas fa-lock"></i>
        </span>
      </p>
    </div>
    <div class="field" style="display: flex; justify-content: flex-end;">
      <p class="control">
        <button class="button is-success has-text-white" [class.is-loading]="isLoading" [disabled]="isLoading" (click)="onSignupButtonClicked(usernameInput.value, emailInput.value, pwInput.value)">
          Sign up
        </button>
      </p>
    </div>
    <br>

    <p class="has-text-white">Already got an account? <a routerLink="/login">Login</a> now!</p>

  </div>
</div>
